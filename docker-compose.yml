services:
  postgres:
    image: postgres:15
    container_name: jiepaiqi-postgres
    environment:
      POSTGRES_DB: jiepaiqi
      POSTGRES_USER: jiepaiqi
      POSTGRES_PASSWORD: jiepaiqi
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: